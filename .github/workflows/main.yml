name: PNR Tracker

permissions:
  contents: write

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      PNR_LIST: ${{ secrets.PNR_LIST }}
      ZOHO_WEBHOOK_URL: ${{ secrets.ZOHO_WEBHOOK_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies & Playwright Browsers
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run PNR Script
        run: python main.py

      - name: Commit and Push state.json
        run: |
          git config --global user.name "pnr-bot"
          git config --global user.email "pnr-bot@example.com"
          git add state.json
          git commit -m "Update PNR state" || echo "No changes"
          git push