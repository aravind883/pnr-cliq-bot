name: PNR Tracker

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Run Script
        run: python main.py

      - name: Commit state.json
        run: |
          git config --global user.name "pnr-bot"
          git config --global user.email "pnr-bot@example.com"
          git add state.json
          git commit -m "Update PNR state" || echo "No changes"
          git push
